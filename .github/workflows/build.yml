name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build and Archive (Unsigned)
      run: |
        xcodebuild archive \
          -project LinkRelay.xcodeproj \
          -scheme LinkRelay \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/LinkRelay.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Package IPA for AltStore
      run: |
        mkdir -p build/Payload
        cp -r build/LinkRelay.xcarchive/Products/Applications/LinkRelay.app build/Payload/
        cd build
        zip -vr LinkRelay.ipa Payload/
        echo "IPA successfully packaged at build/LinkRelay.ipa"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: LinkRelay-Unsigned
        path: build/LinkRelay.ipa
